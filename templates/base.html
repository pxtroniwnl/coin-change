<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Change — {% block title %}Inicio{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="/" class="navbar-brand">
                <span class="coin-icon">¢</span>
                <span class="brand-text">Coin Change</span>
            </a>
            <nav>
                <a href="/" class="{% if request.url.path == '/' %}active{% endif %}">Inicio</a>
                <a href="/analysis" class="{% if request.url.path == '/analysis' %}active{% endif %}">Análisis</a>
            </nav>
        </div>
    </nav>

    <main>
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="footer-title">Coin Change Problem &mdash; Algoritmo y Complejidad &copy; 2026</div>
            <div class="footer-team">
                Shalom Arrieta &middot; Alejandro Patron &middot; Dariem Garcia &middot; Dayana Narvaez &middot; Lineth Villalba
            </div>
        </div>
    </footer>
</body>
</html>
